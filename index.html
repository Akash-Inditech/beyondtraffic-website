
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Beyond Traffic — The Intelligence Platform for Modern Retail</title>

      <!-- Preconnect + preload Manrope so it's available before first paint -->
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
        rel="preload"
        as="style"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      />
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      />

      <style>
        html, body { height: 100%; margin: 0; background: #FFFFFF; }
        #root { height: 100%; }
        /* Apply Manrope immediately so there's no fallback-font flash */
        body, #root, button, input, textarea {
          font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        }
      </style>
    </head>

    <body>
      <!-- GitHub Pages SPA redirect: when 404.html sent us here with a "?/path"
           query, restore the original URL so BrowserRouter can read it. -->
      <script>
        (function (l) {
          if (l.search[1] === "/") {
            var decoded = l.search
              .slice(1)
              .split("&")
              .map(function (s) {
                return s.replace(/~and~/g, "&");
              })
              .join("?");
            window.history.replaceState(
              null,
              "",
              l.pathname.slice(0, -1) + decoded + l.hash,
            );
          }
        })(window.location);
      </script>

      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
